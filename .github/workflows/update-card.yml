name: Update Odin Project Progress Card

on:
  push:
    paths:
      - "progress.json"
      - "generate_card.py"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-card:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate SVG card
        run: python3 generate_card.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet odin_progress_card.svg; then
            git add odin_progress_card.svg
            git commit -m "chore: update Odin Project progress card [skip ci]"
            git push
          else
            echo "No changes to the card, skipping commit."
          fi
