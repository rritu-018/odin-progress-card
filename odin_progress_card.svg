<svg width="500" height="200" viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The Odin Project progress card">
  <defs>
    <linearGradient id="barGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0a500"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
    <style>
      .title { font: 700 20px 'Segoe UI', Helvetica, Arial, sans-serif; fill: #ffffff; }
      .label { font: 600 13px 'Segoe UI', Helvetica, Arial, sans-serif; fill: #8b949e; }
      .value { font: 600 13px 'Segoe UI', Helvetica, Arial, sans-serif; fill: #e6edf3; }
      .pct { font: 700 13px 'Segoe UI', Helvetica, Arial, sans-serif; fill: #e6edf3; }
      .footer { font: 400 11px 'Segoe UI', Helvetica, Arial, sans-serif; fill: #8b949e; }
      .logo { font: 700 13px 'Segoe UI', Helvetica, Arial, sans-serif; fill: #f0a500; }
    </style>
  </defs>

  <!-- Card background -->
  <rect x="0.5" y="0.5" width="499" height="199" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1"/>

  <!-- Header -->
  <text x="30" y="38" class="logo">THE ODIN PROJECT</text>
  <text x="30" y="64" class="title">Foundations</text>

  <!-- Current lesson -->
  <text x="30" y="86" class="label">Current lesson</text>
  <text x="160" y="86" class="value">Learning GIT</text>

  <!-- Progress bar track -->
  <rect x="30" y="96" width="440" height="14" rx="7" fill="#21262d"/>
  <!-- Progress bar fill -->
  <rect x="30" y="96" width="101" height="14" rx="7" fill="url(#barGradient)"/>
  <!-- Percent label -->
  <text x="470" y="90" text-anchor="end" class="pct">23% complete</text>

  <!-- Projects completed -->
  <text x="30" y="138" class="label">Projects completed</text>
  <text x="220" y="138" class="value">0 / 24</text>

  <!-- Divider -->
  <line x1="30" y1="156" x2="470" y2="156" stroke="#30363d" stroke-width="1"/>

  <!-- Footer -->
  <text x="30" y="178" class="footer">Last updated: Jun 21, 2026</text>
  <text x="470" y="178" text-anchor="end" class="footer">theodinproject.com</text>
</svg>
